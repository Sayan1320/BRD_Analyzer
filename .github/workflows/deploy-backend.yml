name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short -k "not e2e and not properties"

  docker-build-verify:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (verify)
        run: docker build -t brd-backend-verify ./backend

  deploy:
    needs: docker-build-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/brd-analyzer/brd-backend"
          docker build -t "$IMAGE:${{ github.sha }}" ./backend
          docker push "$IMAGE:${{ github.sha }}"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ secrets.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/brd-analyzer/brd-backend"
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE_NAME }} \
            --image="$IMAGE:${{ github.sha }}" \
            --region=${{ secrets.CLOUD_RUN_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --set-secrets="GOOGLE_AI_API_KEY=google-ai-api-key:latest,LLAMA_CLOUD_API_KEY=llama-cloud-api-key:latest,ALLOYDB_INSTANCE_URI=alloydb-instance-uri:latest,DB_USER=db-user:latest,DB_PASS=db-pass:latest,DB_NAME=db-name:latest"

      - name: Smoke test
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ secrets.CLOUD_RUN_SERVICE_NAME }} \
            --region=${{ secrets.CLOUD_RUN_REGION }} \
            --format='value(status.url)')
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
            if [ "$STATUS" = "200" ]; then exit 0; fi
            sleep 10
          done
          exit 1
